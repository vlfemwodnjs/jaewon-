<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - 한양대학교 ERICA</title>
    <style>
        :root {
            --hanyang-blue: #003366;
            --hanyang-gold: #8C734B;
            --light-bg: #f8f9fa;
            --text-dark: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--hanyang-blue);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        nav {
            background: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: var(--hanyang-blue);
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
            flex: 1;
        }

        .contact-section {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            color: var(--hanyang-blue);
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--hanyang-blue);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--hanyang-gold);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #6d593a;
        }

        footer {
            background: var(--hanyang-blue);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>Partnership Inquiry</h1>
</header>

<nav>
    <a href="index.html">홈으로</a>
    <a href="lotto.html">로또 추첨기</a>
</nav>

<div class="container">
    <div class="contact-section">
        <h2>제휴 및 협력 문의</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">한양대학교 ERICA와 함께할 소중한 파트너십을 제안해 주세요.</p>
        
        <form action="https://formspree.io/f/xjgjbnkz" method="POST">
            <div class="form-group">
                <label>성함/기업명</label>
                <input type="text" name="name" placeholder="이름 또는 회사명" required>
            </div>
            
            <div class="form-group">
                <label>이메일 주소</label>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>
            
            <div class="form-group">
                <label>문의 주제</label>
                <input type="text" name="subject" placeholder="제휴 테마를 입력해 주세요" required>
            </div>
            
            <div class="form-group">
                <label>상세 내용</label>
                <textarea name="message" rows="6" placeholder="협력하고 싶은 내용을 자유롭게 작성해 주세요" required></textarea>
            </div>
            
            <button type="submit" class="btn">문의 내용 전송하기</button>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2026 한양대학교 ERICA 제휴 문의 센터</p>
</footer>

</body>
</html>
