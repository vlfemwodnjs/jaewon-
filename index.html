<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - Partnership Inquiry</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
            color: #111827;
            text-align: center;
        }
        p {
            margin: 0 0 2rem 0;
            color: #6b7280;
            font-size: 0.9rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            border-width: 2px;
        }
        button {
            width: 100%;
            padding: 0.875rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>제휴 문의</h2>
    <p>정보를 입력하시면 담당자가 연락드립니다.</p>
    
    <form action="https://formspree.io/f/xjgjbnkz" method="POST">
        <div class="form-group">
            <label>이름 / 기업명</label>
            <input type="text" name="name" required placeholder="예: 홍길동">
        </div>
        
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" required placeholder="example@email.com">
        </div>
        
        <div class="form-group">
            <label>문의 내용</label>
            <textarea name="message" rows="5" required placeholder="문의하실 내용을 입력해 주세요"></textarea>
        </div>
        
        <button type="submit">문의하기</button>
    </form>
    
    <div class="footer">
        &copy; 2026 Partnership Center
    </div>
</div>

</body>
</html>
