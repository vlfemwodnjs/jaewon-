<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 전용 시스템</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>제휴 문의 보내기</h2>
    <form action="https://formspree.io/f/xjgjbnkz" method="POST">
        <div class="form-group">
            <label>성함 / 기업명</label>
            <input type="text" name="name" placeholder="문의하시는 분의 성함 또는 회사명" required>
        </div>
        
        <div class="form-group">
            <label>이메일 주소</label>
            <input type="email" name="email" placeholder="답변받으실 이메일 주소" required>
        </div>
        
        <div class="form-group">
            <label>문의 제목</label>
            <input type="text" name="subject" placeholder="문의 주제를 간략히 입력해 주세요" required>
        </div>
        
        <div class="form-group">
            <label>상세 내용</label>
            <textarea name="message" rows="6" placeholder="제휴 또는 협력에 관한 상세 내용을 입력해 주세요" required></textarea>
        </div>
        
        <button type="submit">문의 내용 제출하기</button>
    </form>
    <div class="footer-text">
        &copy; 2026 Partnership Inquiry System. All rights reserved.
    </div>
</div>

</body>
</html>
