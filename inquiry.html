<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - Partnership Inquiry</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        p {
            color: #6b7280;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, ring 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            ring: 2px #3b82f6;
        }
        button {
            width: 100%;
            background-color: #111827;
            color: #ffffff;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #374151;
        }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>제휴 문의</h1>
    <p>협력 제안을 남겨주시면 빠르게 확인 후 연락드리겠습니다.</p>
    
    <form action="https://formspree.io/f/xjgjbnkz" method="POST">
        <div class="form-group">
            <label for="name">성함 또는 단체명</label>
            <input type="text" id="name" name="name" required placeholder="예: 홍길동">
        </div>
        
        <div class="form-group">
            <label for="email">회신 이메일</label>
            <input type="email" id="email" name="email" required placeholder="example@domain.com">
        </div>
        
        <div class="form-group">
            <label for="subject">문의 제목</label>
            <input type="text" id="subject" name="subject" required placeholder="문의 주제를 입력하세요">
        </div>
        
        <div class="form-group">
            <label for="message">상세 내용</label>
            <textarea id="message" name="message" rows="5" required placeholder="내용을 입력해 주세요"></textarea>
        </div>
        
        <button type="submit">문의 보내기</button>
    </form>
    
    <div class="footer-text">
        Powered by Formspree
    </div>
</div>

</body>
</html>
